all: false
dir: internal/mocks
filename: '{{.InterfaceName | snakecase}}_mock.go'
force-file-write: true
formatter: goimports
formatter-options:
  goimports:
    all-errors: false
    comments: true
    format-only: true
    fragment: false
    local-prefix: github.com/handiism/go-clean-arch-poc
    tab-indent: true
    tab-width: 8
generate: true
include-auto-generated: false
log-level: info
structname: 'Mock{{.InterfaceName}}'
pkgname: mocks
recursive: false
require-template-schema-exists: true
template: testify
template-schema: '{{.Template}}.schema.json'
packages:
  github.com/handiism/go-clean-arch-poc/internal/application/port/input:
    config:
      all: true
  github.com/handiism/go-clean-arch-poc/internal/application/port/output:
    config:
      all: true
  github.com/handiism/go-clean-arch-poc/internal/application/validation:
    config:
      all: true
  github.com/handiism/go-clean-arch-poc/internal/domain/event:
    config:
      all: true
  github.com/handiism/go-clean-arch-poc/internal/application/worker:
    config:
      all: true
