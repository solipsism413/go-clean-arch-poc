basePath: /api/v1
definitions:
  dto.AuthOutput:
    properties:
      accessToken:
        type: string
      expiresAt:
        type: string
      refreshToken:
        type: string
      user:
        $ref: '#/definitions/dto.UserOutput'
    type: object
  dto.ChangePasswordInput:
    properties:
      newPassword:
        maxLength: 100
        minLength: 8
        type: string
      oldPassword:
        type: string
    required:
    - newPassword
    - oldPassword
    type: object
  dto.CreateLabelInput:
    properties:
      color:
        type: string
      name:
        maxLength: 50
        minLength: 1
        type: string
    required:
    - color
    - name
    type: object
  dto.CreateTaskInput:
    properties:
      assigneeId:
        type: string
      description:
        maxLength: 5000
        type: string
      dueDate:
        type: string
      labelIds:
        items:
          type: string
        type: array
      priority:
        enum:
        - LOW
        - MEDIUM
        - HIGH
        - URGENT
        type: string
      title:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - priority
    - title
    type: object
  dto.CreateUserInput:
    properties:
      email:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      password:
        maxLength: 100
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  dto.LabelOutput:
    properties:
      color:
        type: string
      createdAt:
        type: string
      id:
        type: string
      name:
        type: string
      updatedAt:
        type: string
    type: object
  dto.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.PermissionOutput:
    properties:
      action:
        type: string
      createdAt:
        type: string
      id:
        type: string
      name:
        type: string
      resource:
        type: string
    type: object
  dto.RoleOutput:
    properties:
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/dto.PermissionOutput'
        type: array
      updatedAt:
        type: string
    type: object
  dto.TaskListOutput:
    properties:
      page:
        type: integer
      pageSize:
        type: integer
      tasks:
        items:
          $ref: '#/definitions/dto.TaskOutput'
        type: array
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  dto.TaskOutput:
    properties:
      assignee:
        $ref: '#/definitions/dto.UserBasicOutput'
      assigneeId:
        type: string
      createdAt:
        type: string
      creator:
        $ref: '#/definitions/dto.UserBasicOutput'
      creatorId:
        type: string
      description:
        type: string
      dueDate:
        type: string
      id:
        type: string
      isOverdue:
        type: boolean
      labels:
        items:
          $ref: '#/definitions/dto.LabelOutput'
        type: array
      priority:
        type: string
      status:
        type: string
      title:
        type: string
      updatedAt:
        type: string
    type: object
  dto.UpdateLabelInput:
    properties:
      color:
        type: string
      name:
        maxLength: 50
        minLength: 1
        type: string
    type: object
  dto.UpdateTaskInput:
    properties:
      clearDueDate:
        type: boolean
      description:
        maxLength: 5000
        type: string
      dueDate:
        type: string
      priority:
        enum:
        - LOW
        - MEDIUM
        - HIGH
        - URGENT
        type: string
      title:
        maxLength: 255
        minLength: 1
        type: string
    type: object
  dto.UpdateUserInput:
    properties:
      email:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
    type: object
  dto.UserBasicOutput:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  dto.UserListOutput:
    properties:
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
      users:
        items:
          $ref: '#/definitions/dto.UserOutput'
        type: array
    type: object
  dto.UserOutput:
    properties:
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      roles:
        items:
          $ref: '#/definitions/dto.RoleOutput'
        type: array
      updatedAt:
        type: string
    type: object
  presenter.ErrorDetail:
    properties:
      code:
        type: string
      details:
        items:
          $ref: '#/definitions/presenter.FieldError'
        type: array
      message:
        type: string
    type: object
  presenter.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/presenter.ErrorDetail'
      success:
        type: boolean
    type: object
  presenter.FieldError:
    properties:
      field:
        type: string
      message:
        type: string
    type: object
  presenter.Response:
    properties:
      data: {}
      meta: {}
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: support@taskmanager.io
    name: API Support
  description: A Task Management Application built with Hexagonal Architecture in
    Go.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Task Manager API
  version: "1.0"
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Change the authenticated user's password
      parameters:
      - description: Password change details
        in: body
        name: passwords
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordInput'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT tokens
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/dto.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidate the current session
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh token
      parameters:
      - description: Refresh token
        in: body
        name: token
        required: true
        schema:
          properties:
            refreshToken:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Refresh token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account and return JWT tokens
      parameters:
      - description: User details
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      summary: Register user
      tags:
      - auth
  /labels:
    get:
      consumes:
      - application/json
      description: Get all available labels
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.LabelOutput'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List labels
      tags:
      - labels
    post:
      consumes:
      - application/json
      description: Create a new label
      parameters:
      - description: Label details
        in: body
        name: label
        required: true
        schema:
          $ref: '#/definitions/dto.CreateLabelInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LabelOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create label
      tags:
      - labels
  /labels/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a label by ID
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete label
      tags:
      - labels
    get:
      consumes:
      - application/json
      description: Get a label by ID
      parameters:
      - description: Label ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LabelOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get label
      tags:
      - labels
    put:
      consumes:
      - application/json
      description: Update an existing label
      parameters:
      - description: Label ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Label updates
        in: body
        name: label
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateLabelInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LabelOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update label
      tags:
      - labels
  /tasks:
    get:
      consumes:
      - application/json
      description: Get a paginated list of tasks with optional filtering
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Filter by status
        enum:
        - TODO
        - IN_PROGRESS
        - IN_REVIEW
        - DONE
        - ARCHIVED
        in: query
        name: status
        type: string
      - description: Filter by priority
        enum:
        - LOW
        - MEDIUM
        - HIGH
        - URGENT
        in: query
        name: priority
        type: string
      - description: Search in title and description
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TaskListOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Create a new task with the provided details
      parameters:
      - description: Task details
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTaskInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TaskOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new task
      tags:
      - tasks
  /tasks/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a task by ID
      parameters:
      - description: Task ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a task
      tags:
      - tasks
    get:
      consumes:
      - application/json
      description: Get detailed information about a specific task
      parameters:
      - description: Task ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TaskOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a task by ID
      tags:
      - tasks
    put:
      consumes:
      - application/json
      description: Update an existing task
      parameters:
      - description: Task ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Task updates
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateTaskInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TaskOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a task
      tags:
      - tasks
  /tasks/{id}/archive:
    post:
      consumes:
      - application/json
      description: Archive a task so it no longer appears as active work
      parameters:
      - description: Task ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TaskOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Archive a task
      tags:
      - tasks
  /tasks/{id}/assign:
    post:
      consumes:
      - application/json
      description: Assign a task to a user
      parameters:
      - description: Task ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Assignee payload
        in: body
        name: body
        required: true
        schema:
          properties:
            assigneeId:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TaskOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Assign a task
      tags:
      - tasks
  /tasks/{id}/complete:
    post:
      consumes:
      - application/json
      description: Mark a task as done
      parameters:
      - description: Task ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TaskOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenter.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Complete a task
      tags:
      - tasks
  /tasks/{id}/labels/{labelId}:
    delete:
      consumes:
      - application/json
      description: Detach a label from a task
      parameters:
      - description: Task ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Label ID
        format: uuid
        in: path
        name: labelId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/presenter.Response'
