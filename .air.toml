# Air hot reload configuration
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  # Command to build the binary
  cmd = "go build -o ./tmp/server ./cmd/server"
  # Entrypoint binary to execute after each build
  entrypoint = ["./tmp/server"]
  # Watch directories
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules"]
  exclude_file = []
  exclude_regex = ["_test.go", ".*_templ.go"]
  exclude_unchanged = false
  follow_symlink = false
  # Delay before restarting (in ms)
  delay = 1000
  # Fail if build errors occur
  stop_on_error = true
  # Send interrupt signal before killing process
  send_interrupt = true
  # Delay before sending kill signal (in ms)
  kill_delay = 500
  # Rerun on files change or only on build failure
  rerun = false
  rerun_delay = 500

[log]
  # Log time
  time = true
  # Log file path
  main_only = false

[color]
  # Custom colors for output
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Clean tmp directory on start
  clean_on_exit = true

[screen]
  # Clear screen before each build
  clear_on_rebuild = true
  # Keep scroll position
  keep_scroll = true
