schema:
  - internal/transport/graphql/schema.graphqls
exec:
  filename: internal/transport/graphql/generated.go
  package: graphql
model:
  filename: internal/transport/graphql/models_gen.go
  package: graphql
resolver:
  layout: follow-schema
  dir: internal/transport/graphql
  package: graphql
  filename_template: "{name}.resolvers.go"
models:
  UUID:
    model: github.com/handiism/go-clean-arch-poc/internal/transport/graphql.UUID
  DateTime:
    model: github.com/handiism/go-clean-arch-poc/internal/transport/graphql.DateTime
